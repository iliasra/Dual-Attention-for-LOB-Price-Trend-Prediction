data:
  raw_data_dir: ../data/LOBSTER
  processed_data_dir: ../data/processed_dataframes
  sequence_data_dir: ../data/sequences
  logs_dir: ../logs
  tick_size: 100.0
  time_column: time
  label_column: trend_label
  label_mapping: {-1: 0, 0: 1, 1: 2}
  price_columns: auto
  volume_columns: auto
  # used to exclude specific columns when features.npy is created
  # to be used to exclude columns to be passed to the model
  # NB: time/label col are automatically excluded as they are used
  # to generate specific .npy files for the model to use. 
  feature_exclude_columns: []
  sequence_window: 64

# fallback only used when folds is empty
dataset_splits:
  train_dates: ["2012-06-21"]
  validation_dates: []
  test_dates: []

# default behavior: uses folds
folds:
  - id: fold_001
    train_dates: ["2012-06-21"]
    validation_dates: []
    test_dates: []

preprocessing:
  snapshot_window: 100
  labels:
    # allowed: smoothing, triple_barrier
    strategy: smoothing
    smoothing:
      # allowed: A, B, C
      method: C
      # threshold is ignored if adaptive_threshold.enabled = true
      threshold: null
      k: 5
      h: 10
      bid_column: bid_price_1
      ask_column: ask_price_1
      adaptive_threshold:
        enabled: true
        exit_spread_window: 100
        volatility_window: 256
        round_trip_fees_bps: 0.8
        volatility_lambda: 1.0
    triple_barrier:
      horizon: 10
      upper_barrier_ticks: 2.0
      lower_barrier_ticks: 3.0
      bid_column: bid_price_1
      ask_column: ask_price_1
      # if null, computes the midprice based on level 1 bid/ask prices
      price_column:
  message:
    size_column: size
    price_column: price
    order_id_column: order_id
    categorical_value_map:
      type: [1, 2, 3, 4, 5]
      direction: [-1, 1]
    drop_columns: [price, size, type, direction, order_id]
  temporal_features:
    add_day_sincos: true
    day_frequency: 86400
    keep_timestamp: true
    # 34200 = 9.30 am
    market_open_seconds: 34200
    # 57600 = 4 pm
    market_close_seconds: 57600
    start_offset_minutes: 15
    end_offset_minutes: 15
  normalization:
    derivatives_stats_dir: ../data/derivatives_z_scores
    # allowed: train_only
    scope: train_only
  kinematic_tokenization:
    # allowed: basis, fast
    method: fast
    # shared by fast price and volume tokenization
    chunk_size: 100000
  price_kinematic:
    enabled: true
    columns: auto
    # allowed: tick, time
    reference: tick
    basis:
      alpha: 5.0
    fast:
      n_basis: 20
      # maximum effective degrees of freedom explored by train GCV optimization
      df: 20.0
      # recommended value: 1.0, or 0.95, 0.9 to increase stability
      eval_at: 1.0
  price_static:
    enabled: true
    columns: auto
    tau_start: 2.0
  volume_kinematic:
    enabled: true
    columns: auto
    # allowed: tick, time
    reference: tick
    basis:
      alpha: 5.0
    fast:
      n_basis: 20
      # maximum effective degrees of freedom explored by train GCV optimization
      df: 20.0
      # recommended value: 1.0, or 0.95, 0.9 to increase stability
      eval_at: 1.0
  volume_static:
    enabled: true
    columns: auto
    k: 2000.0

model:
  # nb of input features to be passed to spatial attention
  # when not provided (None value), the value used is infered from the size
  # of tensor x which has shape=[batch, sequence, d_input]
  d_input:
  d_model: 64
  feature_embed_dim: 16
  feature_num_frequencies: 8
  feature_sigma: 1.0
  num_heads: 4
  max_dt: 3.0
  num_experts: 4
  top_k: 2
  num_classes: 3
  # allowed: crope, hybrid_crope, hybrid-crope, hybrid
  rope_type: crope
  rope_base: 10000
  attention_dropout: 0.1
  moe_dropout: 0.1
  moe_expansion_factor: 4
  moe_router_noise: 0.01
  moe_load_balancing_weight: 0.01
  classifier_dropout: 0.1

training:
  # allowed: cpu, cuda
  device: cpu
  epochs: 2
  batch_size: 8
  num_workers: 0
  early_stopping_patience: 8
  persistent_workers: false
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  focal_gamma: 2.0
  class_weights: [2.0, 10.0, 1.0]
  grad_clip_norm: 1.0
  model_dir: ../results
  use_amp: false
