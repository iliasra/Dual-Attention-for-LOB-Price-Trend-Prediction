preprocessing:
  snapshot_window: 100
  save_processed_dataframes: false # set true to also save large normalized CSV debug/audit files
  labels:
    strategy: smoothing # allowed: smoothing, triple_barrier
    smoothing:
      method: C # allowed: A, B, C
      threshold: null # allowed: numeric fixed threshold, null for adaptive_threshold.enabled=true, or fitted modes mean_spread/mean_pct/mean_pct_2
      fit_scope: null # allowed: null/per_split/train; set null unless threshold is a fitted mode
      k: 9 # 9 to have a window of length 10 to replicate TLOB experiment
      h: 100
      bid_column: bid_price_1
      ask_column: ask_price_1
      adaptive_threshold:
        enabled: true
        exit_spread_window: 100
        volatility_window: 256
        round_trip_fees_bps: 1.5 # estimated for INTC in 03/24
        volatility_lambda: 1.0
    triple_barrier:
      horizon: 10
      upper_barrier_ticks: 2.0
      lower_barrier_ticks: 3.0
      bid_column: bid_price_1
      ask_column: ask_price_1
      # if price_column null, computes the midprice based on level 1 bid/ask prices
      price_column:
  message:
    size_column: size
    price_column: price
    order_id_column: order_id
    categorical_value_map:
      type: [1, 2, 3, 4, 5]
      direction: [-1, 1]
    drop_columns: [price, size, type, direction, order_id]
  temporal_features:
    add_day_sincos: true
    day_frequency: 86400
    keep_timestamp: true
    market_open_seconds: 34200 # 34200 = 9.30 am for NYSE opening
    market_close_seconds: 57600 # 57600 = 4 pm for NYSE closing
    start_offset_minutes: 0
    end_offset_minutes: 0
  normalization:
    derivatives_stats_dir: ../data/derivatives_z_scores
    scope: train_only # allowed: train_only (used for readiness only)
    derivative_scaling_method: quantile_scaling # allowed: zscore, quantile, robust_mad (quantile_scaling legacy alias)
    position_scaling_method: zscore # allowed: zscore, quantile, robust_mad; scales *_kin_pos, fit on train only
    size_log1p_scaling_method: zscore # allowed: zscore, quantile, robust_mad; scales message-level size_log1p, fit on train only
    price_static_scaling_method: zscore # allowed: zscore, quantile, robust_mad; scales message-level price_static after opposite-best distance, fit on train only
    delta_t_transform: log1p # applies log1p(delta_t) before scaling
    delta_t_scaling_method: robust_mad # allowed: zscore, quantile, robust_mad; scales transformed delta_t, fit on train only
  kinematic_tokenization:
    method: fast # allowed: basis, fast
    chunk_size: 100000 # shared by fast price and volume tokenization
    n_df_candidates: 25 # shared number of effective-df candidates explored by train GCV
    orderbook_top_k_levels: 5 # null = all levels; filters price/volume kinematic streams only
  sample_clock:
    mode: event # allowed: event, volume; event preserves one row per LOBSTER message
    volume_step_shares: 500 # required positive value when mode=volume
    volume_source: traded # allowed: traded, message_size
    trade_type_values: [4, 5] # LOBSTER visible/hidden executions for traded-shares volume clock
  microprice:
    enabled: true # adds a price-like kinematic microprice stream only
    levels: 5 # number of LOB levels used to compute microprice
  price_kinematic:
    enabled: true
    columns: auto
    reference: tick # allowed: tick, time
    basis:
      alpha: 5.0 # smoothing parameter
    fast:
      n_basis: 20
      # maximum effective degrees of freedom explored by train GCV optimization
      df: 12.0
      # recommended value: 1.0, or 0.95, 0.9 to increase stability
      eval_at: 0.95
  price_static:
    enabled: true
    columns: auto
    tau_start: 2.0
  volume_kinematic:
    enabled: true
    columns: auto
    reference: tick # allowed: tick, time
    basis:
      alpha: 5.0 # smoothing parameter
    fast:
      n_basis: 20
      # maximum effective degrees of freedom explored by train GCV optimization
      df: 8.0
      # recommended value: 1.0, or 0.95, 0.9 to increase stability
      eval_at: 0.95
  volume_static:
    # Static volume features use 1 - exp(-x / k); k is fitted from train data per fold.
    enabled: true
    columns: auto
    # Quantile (0-100) of train volume values used to fit exponential k.
    quantile: 95.0
    # Scaling target at that quantile: 1 - exp(-Qp / k) = target.
    target: 0.5

model:
  # nb of input features to be passed to spatial attention
  # when not provided (None value), the value used is infered from the size
  # of tensor x which has shape=[batch, sequence, d_input]
  d_input:
  d_model: 256
  feature_embed_dim: 32
  feature_num_frequencies: 8
  feature_sigma: 1.0
  num_layers: 2
  latent_spatial_embed_dim: 16
  num_heads: 4
  # Quantile (0-100) of train sequence time spans used as temporal attention max_dt per fold.
  max_dt_quantile: 95.0
  use_moe: true # false = replace the final MoE tail with a dense FNN
  # MoE-only router/expert selection parameters; ignored when use_moe=false.
  num_experts: 4
  top_k: 2
  num_classes: 3
  # allowed: rope, crope, hybrid_crope, hybrid-crope, hybrid
  rope_type: hybrid_crope
  rope_base: 10000
  attention_dropout: 0.1
  moe_dropout: 0.1 # shared by dense FNN tails and MoE expert networks
  moe_expansion_factor: 4 # shared by dense FNN tails and MoE expert networks
  moe_router_noise: 0.01
  moe_load_balancing_weight: 0.01
  classifier_dropout: 0.1
  classifier_pooling:
    methods: [last, mean] # allowed elements: last, mean, max; multiple values are concatenated
    last_k: 16 # number of final tokens used by mean/max pooling
  auxiliary_heads:
    enabled: true # add movement/neutral and up/down auxiliary heads during training
    movement: true # binary movement head: directional vs neutral
    direction: true # directional head: up vs down on non-neutral examples
    hidden_dim: null # null = d_model // 2 shared classifier trunk

training:
  device: cuda # allowed: cpu, cuda
  epochs: 30
  batch_size: 128 # larger A100 batch; reduces DataLoader iterations per epoch
  eval_batch_size: 256 # evaluation only; no backward pass
  num_workers: 0
  prefetch_factor: null # DataLoader batches prefetched per worker; 16 workers * 4 = up to 64 queued batches
  preload_data_to_memory: true # load compact .npy shards into host RAM before DataLoader workers fork
  validate_every_n_batches: 5000 # allowed: positive int or "epoch"; int validates/checkpoints intra-epoch
  early_stopping_patience: 12 # counts validation intervals when validate_every_n_batches is an int
  early_stopping_warmup: 3 # counts validation intervals when validate_every_n_batches is an int
  early_stopping_min_delta: 0.002
  monitor: precision_at_fixed_rate # allowed: val_loss, val_macro_f1, val_directional_macro_f1, tailored_score, precision_at_fixed_rate
  monitor_mode: max # allowed: min, max; tailored_score and precision_at_fixed_rate require max
  top_k_checkpoints: 3 # keep the best k raw-monitor checkpoints, then select after calibration/thresholding
  monitor_params:
    base_metric: val_macro_f1 # used by tailored_score monitor/thresholds; allowed: val_macro_f1, val_directional_macro_f1
    lambda_ece: 0.0
    lambda_rate: 0.1
    fixed_rate: 0.005 # used by precision_at_fixed_rate; selects top 1% P(down) and top 1% P(up) separately
  persistent_workers: false
  optimizer: adamw # allowed: adam, adamw
  learning_rate: 5.0e-6
  weight_decay: 1.0e-4
  focal_gamma: 0.0
  class_weight_beta: 0.25
  class_weight_min: 0.75
  class_weight_max: 1.5
  auxiliary_losses:
    movement_weight: 0.05 # BCE movement-vs-neutral auxiliary loss weight
    direction_weight: 0.05 # CE up-vs-down auxiliary loss weight on directional examples
    consistency_weight: 0.0 # optional MSE between main and movement probabilities
    movement_pos_weight: auto_clipped # auto = neutral_count / directional_count, clipped below
    movement_pos_weight_min: 0.5
    movement_pos_weight_max: 5.0
    direction_class_weight_beta: 0.0 # up/down auxiliary class weighting exponent
  grad_clip_norm: 1.0
  model_dir: ../results
  use_amp: true
  deterministic_torch: false
  temperature_scaling:
    enabled: true
    class_bias_calibration: true # learn per-class additive logits bias on validation
  directional_thresholds:
    enabled: true
    method: top_x_quantile # allowed: joint_up_down, precision_floor, top_x_quantile
    score: precision_at_fixed_rate # allowed: directional_macro_f1, macro_f1, tailored_score, precision_at_fixed_rate; custom scores use training.monitor_params
    min: 0.1 # lower bound for candidate probability thresholds
    max: 0.95 # upper bound for candidate probability thresholds
    step: 0.05 # coarse grid step; joint_up_down also refines around the best region
    delta: 0.0 # logit-margin gap required to break up/down ties; otherwise neutral
    up_precision_floor: null # required only for precision_floor; null for joint_up_down/top_x_quantile
    down_precision_floor: null # required only for precision_floor; null for joint_up_down/top_x_quantile
    up_quantile: 0.01 # required only for top_x_quantile; 0.01 selects the top 1% p_up validation scores
    down_quantile: 0.01 # required only for top_x_quantile; 0.01 selects the top 1% p_down validation scores
  sampling:
    neutral_to_directional_ratio: 20 # faster training: keep all directional samples, sample 2x as many neutrals

tracking:
  wandb:
    enabled: true
    project: lob-price-trend
    entity: ilias-ramim-imperial-college-london
    mode: auto # auto uses WANDB_MODE when set, otherwise online with offline fallback
    dir: null # null writes W&B files inside the fold log directory
    tags: [INTC24]
    log_best_checkpoint: true
    log_top_k_checkpoints: false
