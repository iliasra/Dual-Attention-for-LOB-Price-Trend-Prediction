data:
  raw_data_dir: ../data/LOBSTER
  processed_data_dir: ../data/processed_dataframes
  sequence_data_dir: ../data/sequences
  tick_size: 100.0
  time_column: time
  label_column: trend_label
  label_mapping: {-1: 0, 0: 1, 1: 2}
  price_columns: auto
  volume_columns: auto
  feature_exclude_columns: []
  sequence_window: 16

dataset_splits:
  train_dates: ["2012-06-21"]
  validation_dates: []
  test_dates: []

preprocessing:
  snapshot_window: 16
  labels:
    # allowed: smoothing, triple_barrier
    strategy: smoothing
    smoothing:
      # allowed: A, B, C
      method: C
      threshold: 1.0e-5
      k: 5
      h: 10
      bid_column: bid_price_1
      ask_column: ask_price_1
    triple_barrier:
      horizon: 10
      upper_barrier_ticks: 2.0
      lower_barrier_ticks: 3.0
      bid_column: bid_price_1
      ask_column: ask_price_1
      price_column:
  message:
    size_column: size
    price_column: price
    order_id_column: order_id
    categorical_value_map:
      type: [1, 2, 3, 4, 5]
      direction: [-1, 1]
    drop_columns: [price, size, type, direction, order_id]
  temporal_features:
    add_day_sincos: true
    day_frequency: 86400
    keep_timestamp: true
    market_open_seconds: 34200
    market_close_seconds: 57600
    start_offset_minutes: 15
    end_offset_minutes: 15
  normalization:
    derivatives_stats_path: ../data/derivatives_z_scores/derivatives_stats.yaml
    # allowed: train_only
    scope: train_only
  kinematic_tokenization:
    # allowed: basis, fast
    method: fast
    # shared by fast price and volume tokenization
    chunk_size: 100000
  price_kinematic:
    enabled: true
    columns: auto
    # allowed: tick, time
    reference: tick
    basis:
      alpha: 5.0
    fast:
      n_basis: 20
      smoothing_lambda: 1.0
      eval_at: 1.0
  price_static:
    enabled: true
    columns: auto
    tau_start: 1.0
    tau_clip: 50.0
    tau_max: 100.0
  volume_kinematic:
    enabled: true
    columns: auto
    # allowed: tick, time
    reference: tick
    basis:
      alpha: 5.0
    fast:
      n_basis: 20
      smoothing_lambda: 1.0
      eval_at: 1.0
  volume_static:
    enabled: true
    columns: auto
    k: 2000.0

model:
  # nb of input features to be passed to spatial attention
  # when not provided (None value), the value used is infered from the size
  # of tensor x which has shape=[batch, sequence, d_input]
  d_input:
  d_model: 64
  feature_embed_dim: 16
  feature_num_frequencies: 8
  feature_sigma: 1.0
  num_heads: 4
  max_dt: 3.0
  num_experts: 4
  top_k: 2
  num_classes: 3
  # allowed: crope, hybrid_crope, hybrid-crope, hybrid
  rope_type: crope
  rope_base: 10000
  attention_dropout: 0.1
  moe_dropout: 0.1
  moe_expansion_factor: 4
  moe_router_noise: 0.01
  moe_load_balancing_weight: 0.01
  classifier_dropout: 0.1

training:
  # allowed: cpu, cuda
  device: cpu
  epochs: 2
  batch_size: 8
  num_workers: 0
  persistent_workers: false
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  focal_gamma: 2.0
  class_weights: [2.0, 10.0, 1.0]
  grad_clip_norm: 1.0
  best_model_path: ../results/best_lob_transformer.pth
  use_amp: false
