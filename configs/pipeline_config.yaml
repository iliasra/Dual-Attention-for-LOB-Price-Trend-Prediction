seed: 42

data:
  raw_data_dir: ../data/LOBSTER
  processed_data_dir: ../data/processed_dataframes
  sequence_data_dir: ../data/sequences
  logs_dir: ../logs
  tick_size: 100.0 # LOBSTER multiplies prices by a factor 10_000
  time_column: time
  label_column: trend_label
  label_mapping: {-1: 0, 0: 1, 1: 2}
  price_columns: auto
  volume_columns: auto
  # used to exclude specific columns when features.npy is created
  # to be used to exclude columns to be passed to the model
  # NB: time/label col are automatically excluded as they are used
  # to generate specific .npy files for the model to use. 
  feature_exclude_columns: []
  sequence_window: 64

# fallback only used when folds is empty
dataset_splits:
  train_dates: ["2024-03-04"]
  validation_dates: ["2024-03-05"]
  test_dates: ["2024-03-06"]

# default behavior: uses folds
folds:
  - id: fold_001
    train_dates: ["2024-03-04", "2024-03-05", "2024-03-06"]
    validation_dates: ["2024-03-07"]
    test_dates: ["2024-03-08"]
  - id: fold_002
    train_dates: ["2024-03-04", "2024-03-05", "2024-03-06", "2024-03-07"]
    validation_dates: ["2024-03-08"]
    test_dates: ["2024-03-11"]
  - id: fold_003
    train_dates: ["2024-03-04", "2024-03-05", "2024-03-06", "2024-03-07", "2024-03-08"]
    validation_dates: ["2024-03-11"]
    test_dates: ["2024-03-12"]
  - id: fold_004
    train_dates: ["2024-03-04", "2024-03-05", "2024-03-06", "2024-03-07", "2024-03-08", "2024-03-11"]
    validation_dates: ["2024-03-12"]
    test_dates: ["2024-03-13"]
  - id: fold_005
    train_dates: ["2024-03-04", "2024-03-05", "2024-03-06", "2024-03-07", "2024-03-08", "2024-03-11", "2024-03-12"]
    validation_dates: ["2024-03-13"]
    test_dates: ["2024-03-14"]
  - id: fold_006
    train_dates: ["2024-03-04", "2024-03-05", "2024-03-06", "2024-03-07", "2024-03-08", "2024-03-11", "2024-03-12", "2024-03-13"]
    validation_dates: ["2024-03-14"]
    test_dates: ["2024-03-15"]

preprocessing:
  snapshot_window: 100
  labels:
    strategy: smoothing # allowed: smoothing, triple_barrier
    smoothing:
      method: C # allowed: A, B, C
      threshold: null # threshold is ignored if adaptive_threshold.enabled = true
      k: 10
      h: 100
      bid_column: bid_price_1
      ask_column: ask_price_1
      adaptive_threshold:
        enabled: true
        exit_spread_window: 100
        volatility_window: 256
        round_trip_fees_bps: 1.5 # estimated for INTC in 03/24
        volatility_lambda: 1.0
    triple_barrier:
      horizon: 10
      upper_barrier_ticks: 2.0
      lower_barrier_ticks: 3.0
      bid_column: bid_price_1
      ask_column: ask_price_1
      # if price_column null, computes the midprice based on level 1 bid/ask prices
      price_column:
  message:
    size_column: size
    price_column: price
    order_id_column: order_id
    categorical_value_map:
      type: [1, 2, 3, 4, 5]
      direction: [-1, 1]
    drop_columns: [price, size, type, direction, order_id]
  temporal_features:
    add_day_sincos: true
    day_frequency: 86400
    keep_timestamp: true
    market_open_seconds: 34200 # 34200 = 9.30 am for NYSE opening
    market_close_seconds: 57600 # 57600 = 4 pm for NYSE closing
    start_offset_minutes: 15
    end_offset_minutes: 15
  normalization:
    derivatives_stats_dir: ../data/derivatives_z_scores
    scope: train_only # allowed: train_only (used for readiness only)
  kinematic_tokenization:
    method: fast # allowed: basis, fast
    chunk_size: 100000 # shared by fast price and volume tokenization
    n_df_candidates: 25 # shared number of effective-df candidates explored by train GCV
  price_kinematic:
    enabled: true
    columns: auto
    reference: tick # allowed: tick, time
    basis:
      alpha: 5.0 # smoothing parameter
    fast:
      n_basis: 20
      # maximum effective degrees of freedom explored by train GCV optimization
      df: 12.0
      # recommended value: 1.0, or 0.95, 0.9 to increase stability
      eval_at: 0.95
  price_static:
    enabled: true
    columns: auto
    tau_start: 2.0
  volume_kinematic:
    enabled: true
    columns: auto
    reference: tick # allowed: tick, time
    basis:
      alpha: 5.0 # smoothing parameter
    fast:
      n_basis: 20
      # maximum effective degrees of freedom explored by train GCV optimization
      df: 8.0
      # recommended value: 1.0, or 0.95, 0.9 to increase stability
      eval_at: 0.95
  volume_static:
    # Static volume features use 1 - exp(-x / k); k is fitted from train data per fold.
    enabled: true
    columns: auto
    # Quantile (0-100) of train volume values used to fit exponential k.
    quantile: 95.0
    # Scaling target at that quantile: 1 - exp(-Qp / k) = target.
    target: 0.5

model:
  # nb of input features to be passed to spatial attention
  # when not provided (None value), the value used is infered from the size
  # of tensor x which has shape=[batch, sequence, d_input]
  d_input:
  d_model: 128
  feature_embed_dim: 16
  feature_num_frequencies: 8
  feature_sigma: 1.0
  num_heads: 4
  # Quantile (0-100) of train sequence time spans used as temporal attention max_dt per fold.
  max_dt_quantile: 95.0
  num_experts: 4
  top_k: 2
  num_classes: 3
  # allowed: crope, hybrid_crope, hybrid-crope, hybrid
  rope_type: crope
  rope_base: 10000
  attention_dropout: 0.1
  moe_dropout: 0.1
  moe_expansion_factor: 4
  moe_router_noise: 0.01
  moe_load_balancing_weight: 0.01
  classifier_dropout: 0.1

training:
  device: cuda # allowed: cpu, cuda
  epochs: 20
  batch_size: 128 # tuned with the dry-run
  eval_batch_size: 256 # evaluation only; no backward pass
  num_workers: 8
  early_stopping_patience: 3
  monitor: val_directional_macro_f1 # allowed: val_loss, val_macro_f1, val_directional_macro_f1
  monitor_mode: max # allowed: min, max
  persistent_workers: true
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  focal_gamma: 1.0
  class_weight_beta: 0.25
  class_weight_min: 0.5
  class_weight_max: 3.0
  grad_clip_norm: 1.0
  model_dir: ../results
  use_amp: true
  deterministic_torch: false
  sampling:
    neutral_to_directional_ratio: 2.0 # downsampling of neutral class
