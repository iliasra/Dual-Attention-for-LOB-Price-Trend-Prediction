seed: 42

experiment:
  name: auxiliary_test_h100

data:
  raw_data_dir: ../data/F1_2010
  processed_data_dir: ../data/processed_dataframes_fi2010
  sequence_data_dir: ../data/sequences
  logs_dir: ../logs
  tick_size: 1.0
  time_column: time
  label_column: trend_label
  # FI-2010 labels are saved as raw_label - 1: class 0=up, 1=neutral, 2=down.
  # This mapping gives the shared logging/threshold code the usual raw semantics.
  label_mapping: {-1: 2, 0: 1, 1: 0}
  price_columns: auto
  volume_columns: auto
  feature_exclude_columns: []
  sequence_window: 128

dataset_splits:
  train_dates: ["0001-train"]
  validation_dates: ["0002-validation"]
  test_dates: ["0003-test"]

folds:
  - id: fi2010_tlob_h100
    train_dates: ["0001-train"]
    validation_dates: ["0002-validation"]
    test_dates: ["0003-test"]

preprocessing:
  # Compatibility-only block for the shared config loader.
  # FI-2010/TLOB training uses prebuilt .npy sequences, not this preprocessing path.
  snapshot_window: 1
  save_processed_dataframes: false
  labels:
    strategy: smoothing
    smoothing:
      method: C
      threshold: 0.0
      fit_scope: null # allowed: null/per_split/train; set null unless threshold is a fitted mode
      k: 0
      h: 1
      bid_column: bid_price_1
      ask_column: ask_price_1
      adaptive_threshold:
        enabled: false
        exit_spread_window: 1
        volatility_window: 1
        round_trip_fees_bps: 0.0
        volatility_lambda: 0.0
        label_timing: ex_ante # allowed: ex_ante, ex_post; ex_post uses realized costs/vol for labels only, not model features
        include_exante_features: false # set true to expose ex-ante adaptive label components as model features
    triple_barrier:
      horizon: 1
      upper_barrier_ticks: 0.0
      lower_barrier_ticks: 0.0
      bid_column: bid_price_1
      ask_column: ask_price_1
      price_column:
  message:
    size_column: size
    price_column: price
    order_id_column: order_id
    categorical_value_map:
      type: [1, 2, 3, 4, 5]
      direction: [-1, 1]
    drop_columns: [price, size, type, direction, order_id]
  temporal_features:
    add_day_sincos: false
    day_frequency: 1
    keep_timestamp: true
    market_open_seconds: 0
    market_close_seconds: 1
    start_offset_minutes: 0
    end_offset_minutes: 0
  normalization:
    derivatives_stats_dir: ../data/derivatives_z_scores_fi2010
    scope: train_only
    derivative_scaling_method: zscore # allowed: zscore, quantile, robust_mad (quantile_scaling legacy alias)
    position_scaling_method: zscore # allowed: zscore, quantile, robust_mad; scales *_kin_pos, fit on train only
    size_log1p_scaling_method: zscore # allowed: zscore, quantile, robust_mad; scales message-level size_log1p, fit on train only
    price_static_scaling_method: zscore # allowed: zscore, quantile, robust_mad; scales message-level price_static after opposite-best distance, fit on train only
    adaptive_label_feature_scaling_method: zscore # allowed: zscore, quantile, robust_mad; used only when include_exante_features=true
    delta_t_transform: log1p # applies log1p(delta_t) before scaling
    delta_t_scaling_method: robust_mad # allowed: zscore, quantile, robust_mad; scales transformed delta_t, fit on train only
  kinematic_tokenization:
    method: fast
    chunk_size: 1
    n_df_candidates: 1
  price_kinematic:
    enabled: false
    columns: auto
    reference: tick
    basis:
      alpha: 0.0
    fast:
      n_basis: 4
      df: 1.0
      eval_at: 0.0
  price_static:
    enabled: false
    columns: auto
    tau_start: 0.0
    tau_clip:
    tau_max:
  volume_kinematic:
    enabled: false
    columns: auto
    reference: tick
    basis:
      alpha: 0.0
    fast:
      n_basis: 4
      df: 1.0
      eval_at: 0.0
  volume_static:
    enabled: false
    columns: auto
    quantile: 0.0
    target: 0.5

model:
  d_input: 144
  d_model: 256
  feature_embed_dim: 32
  feature_num_frequencies: 8
  feature_sigma: 1.0
  num_layers: 3
  latent_spatial_embed_dim: 16
  num_heads: 4
  max_dt_quantile: 95.0
  max_dt:
  use_moe: true # false = replace the final MoE tail with a dense FNN
  # MoE-only router/expert selection parameters; ignored when use_moe=false.
  num_experts: 4
  top_k: 2
  num_classes: 3
  rope_type: rope # allowed: rope, crope, hybrid_crope, hybrid-crope, hybrid
  rope_base: 10000
  attention_dropout: 0.1
  moe_dropout: 0.1 # shared by dense FNN tails and MoE expert networks
  moe_expansion_factor: 4 # shared by dense FNN tails and MoE expert networks
  moe_router_noise: 0.01
  moe_load_balancing_weight: 0.01
  classifier_dropout: 0.1
  classifier_pooling:
    methods: [last, mean, max] # allowed elements: last, mean, max; multiple values are concatenated
    last_k: 16 # number of final tokens used by mean/max pooling
  auxiliary_heads:
    enabled: true # add movement/neutral and up/down auxiliary heads during training
    movement: true # binary movement head: directional vs neutral
    direction: true # directional head: up vs down on non-neutral examples
    hidden_dim: null # null = d_model // 2 shared classifier trunk

training:
  device: cuda
  epochs: 100
  batch_size: 64
  eval_batch_size: 256
  num_workers: 8
  early_stopping_patience: 12
  early_stopping_warmup: 0
  early_stopping_min_delta: 0.0002
  validate_every_n_batches: "epoch" # FI2010 keeps legacy validation/checkpointing at epoch boundaries
  validate_at_epoch_end: false # ignored when validate_every_n_batches is "epoch"
  monitor: tailored_score # allowed: val_loss, val_macro_f1, val_directional_macro_f1, tailored_score, precision_at_fixed_rate
  monitor_mode: max # allowed: min, max; tailored_score and precision_at_fixed_rate require max
  top_k_checkpoints: 5 # keep the best k raw-monitor checkpoints, then select after calibration/thresholding
  monitor_params:
    base_metric: val_macro_f1 # used by tailored_score monitor/thresholds; allowed: val_macro_f1, val_directional_macro_f1
    lambda_ece: 0.0
    lambda_rate: 0.1
    fixed_rate: 0.01 # used by precision_at_fixed_rate; selects top 1% P(down) and top 1% P(up) separately
  persistent_workers: true
  optimizer: adamw # allowed: adam, adamw, muon
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  focal_gamma: 0.0
  class_weight_beta: 0.25
  class_weight_min: 0.75
  class_weight_max: 1.75
  auxiliary_losses:
    movement_weight: 0.05 # BCE movement-vs-neutral auxiliary loss weight
    direction_weight: 0.05 # CE up-vs-down auxiliary loss weight on directional examples
    consistency_weight: 0.0 # optional MSE between main and movement probabilities
    movement_pos_weight: auto_clipped # auto = neutral_count / directional_count, clipped below
    movement_pos_weight_min: 0.5
    movement_pos_weight_max: 5.0
    direction_class_weight_beta: 0.0 # up/down auxiliary class weighting exponent
  grad_clip_norm: 1.0
  model_dir: ../results
  use_amp: true
  deterministic_torch: false
  temperature_scaling:
    enabled: true
    class_bias_calibration: true # learn per-class additive logits bias on validation
  directional_thresholds:
    enabled: true
    method: joint_up_down # allowed: joint_up_down, precision_floor, top_x_quantile
    score: tailored_score # allowed: directional_macro_f1, macro_f1, tailored_score, precision_at_fixed_rate; custom scores use training.monitor_params
    min: 0.05 # lower bound for candidate probability thresholds
    max: 0.95 # upper bound for candidate probability thresholds
    step: 0.05 # coarse grid step; joint_up_down also refines around the best region
    delta: 0.002 # logit-margin gap required to break up/down ties; otherwise neutral
    up_precision_floor: null # required only for precision_floor; null for joint_up_down/top_x_quantile
    down_precision_floor: null # required only for precision_floor; null for joint_up_down/top_x_quantile
    up_quantile: null # required only for top_x_quantile; 0.01 selects the top 1% p_up validation scores
    down_quantile: null # required only for top_x_quantile; 0.01 selects the top 1% p_down validation scores
  sampling:
    neutral_to_directional_ratio:

tracking:
  wandb:
    enabled: false
    project: lob-price-trend
    entity: null
    mode: auto # auto uses WANDB_MODE when set, otherwise online with offline fallback
    dir: null # null writes W&B files inside the fold log directory
    tags: []
    log_best_checkpoint: true
    log_top_k_checkpoints: false
