- id: ML1
  config: configs_runs/ML1.yaml
  stage: ml_baseline
  runner: baselines/run_baselines.py
  execute: false
  status: blocked_parameter_resolution
  prerequisites:
  - resolve TRANSFORMER_PARAM_COUNT from the matched Transformer run
  command:
  - python
  - baselines/run_baselines.py
  - --config
  - configs_runs/ML1.yaml
  - --run-stem
  - ML1
  - --sequence-dir
  - data/sequences_final/exec_cls_kin/intc_dev
  - --output
  - metrics/ML1/intc_dev/validation/metrics.json
  - --model
  - mlp
  - --context
  - last_mean
  - --endpoint-support
  - common
  - --seed
  - 42
  - --max-train-rows
  - 200000
  - --max-eval-rows
  - 0
  - --epochs
  - 20
  - --mlp-layers
  - 2
  - --target-parameters
  - <TRANSFORMER_PARAM_COUNT>
  - --model-output
  - results/ML1/intc_dev/baseline_model.pkl
