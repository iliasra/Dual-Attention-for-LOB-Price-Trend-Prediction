  - python
  - scripts/evaluate_baseline.py
  - --artifact
  - results/ML1/intc_dev/baseline_model.pkl
  - --sequence-dir
  - data/sequences_final/exec_cls_kin/intc_dev
  - --split
  - test
  - --output
  - metrics/ML1/intc_dev/test/metrics.json
  notes: Training cap is fixed at 200000 rows; validation/test remain uncapped.
  frozen_holdout_command:
  - python
  - scripts/evaluate_baseline.py
  - --artifact
  - results/ML1/intc_dev/baseline_model.pkl
  - --sequence-dir
  - data/sequences_final/exec_cls_kin/intc_dev
