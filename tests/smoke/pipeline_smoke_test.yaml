data:
  raw_data_dir: ../data/LOBSTER
  processed_data_dir: ../data/processed_dataframes
  sequence_data_dir: ../data/sequences
  logs_dir: ../logs
  tick_size: 100.0
  time_column: time
  label_column: trend_label
  label_mapping: {-1: 0, 0: 1, 1: 2}
  price_columns: auto
  volume_columns: auto
  feature_exclude_columns: []
  sequence_window: 4

dataset_splits:
  train_dates: ["2012-06-21"]
  validation_dates: ["2012-06-22"]
  test_dates: ["2012-06-23"]

folds:
  - id: fold_001
    train_dates: ["2012-06-21"]
    validation_dates: ["2012-06-22"]
    test_dates: ["2012-06-23"]

preprocessing:
  snapshot_window: 4
  labels:
    strategy: smoothing
    smoothing:
      method: C
      threshold: 1.0e-5
      k: 2
      h: 2
      bid_column: bid_price_1
      ask_column: ask_price_1
      adaptive_threshold:
        enabled: true
        exit_spread_window: 8
        volatility_window: 8
        round_trip_fees_bps: 0.0
        volatility_lambda: 1.0
    triple_barrier:
      horizon: 10
      upper_barrier_ticks: 2.0
      lower_barrier_ticks: 3.0
      bid_column: bid_price_1
      ask_column: ask_price_1
      price_column:
  message:
    size_column: size
    price_column: price
    order_id_column: order_id
    categorical_value_map:
      type: [1, 2, 3, 4, 5]
      direction: [-1, 1]
    drop_columns: [price, size, type, direction, order_id]
  temporal_features:
    add_day_sincos: true
    day_frequency: 86400
    keep_timestamp: true
    market_open_seconds: 34200
    market_close_seconds: 57600
    start_offset_minutes: 15
    end_offset_minutes: 15
  normalization:
    derivatives_stats_dir: .smoke
    scope: train_only
  kinematic_tokenization:
    method: basis
    chunk_size: 100000
    n_df_candidates: 25
  price_kinematic:
    enabled: true
    columns: auto
    reference: tick
    basis:
      alpha: 2.0
    fast:
      n_basis: 6
      df: 6.0
      eval_at: 1.0
  price_static:
    enabled: true
    columns: auto
    tau_start: 2.0
  volume_kinematic:
    enabled: true
    columns: auto
    reference: tick
    basis:
      alpha: 2.0
    fast:
      n_basis: 6
      df: 6.0
      eval_at: 1.0
  volume_static:
    # Static volume features use 1 - exp(-x / k); k is fitted from train data per fold.
    enabled: true
    columns: auto
    # Quantile (0-100) of train volume values used to fit exponential k.
    quantile: 95.0
    # Scaling target at that quantile: 1 - exp(-Qp / k) = target.
    target: 0.5

model:
  d_input:
  d_model: 32
  feature_embed_dim: 8
  feature_num_frequencies: 4
  feature_sigma: 1.0
  num_heads: 4
  # Quantile (0-100) of train sequence time spans used as temporal attention max_dt per fold.
  max_dt_quantile: 95.0
  num_experts: 2
  top_k: 1
  num_classes: 3
  rope_type: hybrid_crope
  rope_base: 10000
  attention_dropout: 0.1
  moe_dropout: 0.1
  moe_expansion_factor: 2
  moe_router_noise: 0.01
  moe_load_balancing_weight: 0.01
  classifier_dropout: 0.1

training:
  device: cpu
  epochs: 1
  batch_size: 4
  eval_batch_size: 4
  num_workers: 0
  early_stopping_patience: 8
  monitor: val_loss
  monitor_mode: min
  persistent_workers: false
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  focal_gamma: 2.0
  class_weight_beta: 0.25
  class_weight_min: 0.5
  class_weight_max: 3.0
  grad_clip_norm: 1.0
  model_dir: .smoke
  use_amp: false
  deterministic_torch: false
